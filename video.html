<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HMB Design</title>
    <link rel="icon" type="image/png" href="ampersand.png?v=2">
    <link rel="stylesheet" href="style.css?v=7">
</head>
<body class="video-page">
    <a href="index.html" class="video-back" aria-label="Back to gallery">&#123;</a>

    <div class="video-stage">
        <video id="player" controls autoplay loop playsinline preload="auto"></video>
    </div>

    <p class="video-missing" id="missing" hidden>That film isn&rsquo;t available. <a href="index.html">Back to the gallery</a>.</p>

    <script>
        // Whitelist, deliberately. The key comes from the query string, so the file path is
        // never built from user input — an unknown key falls through to the message below
        // rather than pointing a <video> at whatever the URL asked for.
        const FILMS = {
            booklet: {
                src: 'portfolio_projects/rut_holly/booklet.mp4',
                poster: 'portfolio_projects/rut_holly/booklet_poster.jpg'
            },
            foldout: {
                src: 'portfolio_projects/rut_holly/foldout.mp4',
                poster: 'portfolio_projects/rut_holly/foldout_poster.jpg'
            }
        };

        const key = new URLSearchParams(window.location.search).get('v');
        const film = Object.prototype.hasOwnProperty.call(FILMS, key) ? FILMS[key] : null;
        const player = document.getElementById('player');

        if (film) {
            // Poster first so the frame the visitor tapped stays on screen while the file loads,
            // rather than dropping them onto a black rectangle.
            player.setAttribute('poster', film.poster);
            player.setAttribute('src', film.src);
        } else {
            document.querySelector('.video-stage').hidden = true;
            document.getElementById('missing').hidden = false;
        }
    </script>
</body>
</html>

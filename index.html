<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMB Design</title>
    <link rel="icon" type="image/png" href="ampersand.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="loader"></div>

    <!-- Top Text Container -->
    <div class="top-container">
        <p class="description">
            <strong>Holly Mia Britton</strong> is a British-American artist, designer, and creative director who graduated from Parsons, The New School. Her craft includes commissioned artworks, custom stationery, visual identities, and creative direction for select clients.
        </p>
        <div class="links">
            <a href="mailto:hollybrittondesign@gmail.com" class="hover-link">Email</a>
            <a href="https://www.instagram.com/hollymia" target="_blank" class="hover-link">Instagram</a>
        </div>
    </div>

    <!-- Fixed Dynamic Scroll Buttons -->
    <img src="bracket.png" alt="Scroll Left" class="scroll-bracket left" id="scrollBtnLeft">
    <img src="bracket_right.png" alt="Scroll Right" class="scroll-bracket right" id="scrollBtnRight">

    <!-- Horizontal Scroll Gallery -->
    <main class="horizontal-scroll" id="scrollContainer">
        
        <!-- Rut & Holly -->
        <div class="slide">
            <img src="portfolio_projects/rut&holly/wedding_invite.png" alt="Wedding Invite" loading="lazy">
        </div>
        <div class="slide">
            <video loop muted playsinline preload="none" data-src="portfolio_projects/rut&holly/Untitled - July 13, 2026 at 12.37.45 (2).mp4">
            </video>
        </div>
        <div class="slide">
            <img src="portfolio_projects/rut&holly/tati.png" alt="Tati" loading="lazy">
        </div>
        <div class="slide">
            <video loop muted playsinline preload="none" data-src="portfolio_projects/rut&holly/foldout.mp4">
            </video>
        </div>

        <!-- Indie & Harry -->
        <div class="slide">
            <img src="portfolio_projects/indie&harry/invite_final.png" alt="Invite" loading="lazy">
        </div>
        <div class="slide">
            <img src="portfolio_projects/indie&harry/flower.png" alt="Flower" loading="lazy">
        </div>
        <div class="slide">
            <img src="portfolio_projects/indie&harry/map_2.png" alt="Map 2" loading="lazy">
        </div>

        <!-- Found -->
        <div class="slide">
            <img src="portfolio_projects/found/blue_speakers.png" alt="Blue Speakers" loading="lazy">
        </div>
        <div class="slide">
            <img src="portfolio_projects/found/logo_test1.png" alt="Found Logo Test" loading="lazy">
        </div>
    </main>
    
    <script>
        // Fade out loader
        window.addEventListener('load', () => {
            const loader = document.querySelector('.loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);

            // True Native Infinite Scroll (Massive Buffer Approach)
            const container = document.getElementById('scrollContainer');
            const originalSlides = Array.from(container.children);
            
            const cloneMultiplier = 40; 
            const middleSetIndex = 20;

            // Clone sets to create the massive buffer
            for (let i = 0; i < cloneMultiplier; i++) {
                originalSlides.forEach(slide => {
                    container.appendChild(slide.cloneNode(true));
                });
            }

            // Lazy Load Videos for Performance (Staggered to prevent scroll stutter)
            const videoObserver = new IntersectionObserver((entries) => {
                // Keep track of how many videos need to load in this batch to stagger them
                let loadDelay = 0;
                
                entries.forEach((entry) => {
                    const video = entry.target;
                    if (entry.isIntersecting) {
                        // Inject source if it hasn't been injected yet
                        if (!video.querySelector('source')) {
                            setTimeout(() => {
                                const source = document.createElement('source');
                                source.src = video.getAttribute('data-src');
                                source.type = 'video/mp4';
                                video.appendChild(source);
                                // Don't call .load() as it can block the main thread; appending source is enough
                            }, loadDelay);
                            loadDelay += 150; // Stagger each video initialization by 150ms to prevent CPU spikes
                        }
                        
                        // Play the video (will naturally play once source is injected and buffered)
                        video.play().catch(e => console.log('Autoplay prevented:', e));
                    } else {
                        // Pause video when out of view to save CPU/battery
                        video.pause();
                    }
                });
            }, {
                root: container,
                rootMargin: '4000px 0px' // Start buffering extremely early so the CPU spike happens far away from the viewer
            });

            container.querySelectorAll('video').forEach(video => {
                videoObserver.observe(video);
            });

            // Identify the exact DOM element we want to start on (first slide of the middle set)
            const targetSlideIndex = middleSetIndex * originalSlides.length;
            const targetSlide = container.children[targetSlideIndex];

            const jumpToCenter = () => {
                container.style.scrollBehavior = 'auto';
                // offsetLeft gives the exact pixel coordinate of the element, avoiding all subpixel division errors
                container.scrollLeft = targetSlide.offsetLeft;
                void container.offsetHeight; // Reflow
                container.style.scrollBehavior = 'smooth';
            };

            // Jump immediately
            setTimeout(jumpToCenter, 100);

            // If videos load metadata later and push the layout, re-anchor (only if the user hasn't touched the scroll yet)
            let hasUserInteracted = false;
            container.addEventListener('wheel', () => hasUserInteracted = true, { once: true });
            container.addEventListener('touchstart', () => hasUserInteracted = true, { once: true });
            container.addEventListener('mousedown', () => hasUserInteracted = true, { once: true });
            
            container.querySelectorAll('video').forEach(v => {
                v.addEventListener('loadedmetadata', () => {
                    if (!hasUserInteracted) jumpToCenter();
                });
            });

            // Safety-net teleport
            let scrollTimeout;
            container.addEventListener('scroll', () => {
                clearTimeout(scrollTimeout);
                
                scrollTimeout = setTimeout(() => {
                    const currentScroll = container.scrollLeft;
                    
                    // Approximate width is fine for detecting if we hit the boundaries
                    const singleSetWidthApprox = container.scrollWidth / (cloneMultiplier + 1);

                    if (currentScroll < singleSetWidthApprox * 2) {
                        // Always teleport to the exact DOM coordinate
                        container.scrollLeft = targetSlide.offsetLeft;
                        void container.offsetHeight;
                    } 
                    else if (currentScroll > singleSetWidthApprox * (cloneMultiplier - 2)) {
                        container.scrollLeft = targetSlide.offsetLeft;
                        void container.offsetHeight;
                    }
                }, 200);
            });

            // Enable horizontal scrolling with mouse wheel/trackpad
            container.addEventListener('wheel', (evt) => {
                if (evt.deltaY !== 0) {
                    evt.preventDefault();
                    container.scrollLeft += evt.deltaY;
                }
            }, { passive: false });

            // Bracket Scroll Button Logic
            const scrollBtnLeft = document.getElementById('scrollBtnLeft');
            const scrollBtnRight = document.getElementById('scrollBtnRight');
            
            scrollBtnLeft.addEventListener('click', () => {
                const scrollAmount = window.innerWidth * 0.6; 
                container.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
            });

            scrollBtnRight.addEventListener('click', () => {
                const scrollAmount = window.innerWidth * 0.6; 
                container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMB Design</title>
    <link rel="icon" type="image/png" href="ampersand.png?v=2">
    <!-- Preload the critical first image so it appears instantly -->
    <link rel="preload" as="image" href="portfolio_projects/rut&holly/wedding_invite.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="loader"></div>

    <!-- Top Text Container -->
    <div class="top-container">
        <p class="description">
            <strong>Holly Mia Britton</strong> is a British-American artist, designer, and creative director who graduated from Parsons, The New School. Her craft includes commissioned artworks, custom stationery, visual identities, and creative direction for select clients.
        </p>
        <div class="links">
            <a href="mailto:hollybrittondesign@gmail.com" class="hover-link">Email</a>
            <a href="https://www.instagram.com/hollymia" target="_blank" class="hover-link">Instagram</a>
        </div>
    </div>

    <!-- Fixed Dynamic Scroll Buttons -->
    <img src="bracket.png" alt="Scroll Left" class="scroll-bracket left" id="scrollBtnLeft">
    <img src="bracket_right.png" alt="Scroll Right" class="scroll-bracket right" id="scrollBtnRight">

    <!-- Horizontal Scroll Gallery -->
    <main class="horizontal-scroll" id="scrollContainer">
        
        <!-- Rut & Holly -->
        <div class="slide">
            <img src="portfolio_projects/rut&holly/wedding_invite.png" alt="Wedding Invite" style="aspect-ratio: 1098/1500;">
        </div>
        <div class="slide">
            <video loop muted playsinline preload="none" data-src="portfolio_projects/rut&holly/Untitled - July 13, 2026 at 12.37.45 (2).mp4" style="aspect-ratio: 1542/1080;">
            </video>
        </div>
        <div class="slide">
            <img src="portfolio_projects/rut&holly/tati.png" alt="Tati" style="aspect-ratio: 1000/1500;">
        </div>
        <div class="slide">
            <video loop muted playsinline preload="none" data-src="portfolio_projects/rut&holly/foldout.mp4" style="aspect-ratio: 2498/2558;">
            </video>
        </div>

        <!-- Indie & Harry -->
        <div class="slide">
            <img src="portfolio_projects/indie&harry/invite_final.png" alt="Invite" style="aspect-ratio: 1159/1500;">
        </div>
        <div class="slide">
            <img src="portfolio_projects/indie&harry/flower.png" alt="Flower" style="aspect-ratio: 1159/1500;">
        </div>
        <div class="slide">
            <img src="portfolio_projects/indie&harry/map_2.png" alt="Map 2" style="aspect-ratio: 1159/1500;">
        </div>

        <!-- Found -->
        <div class="slide">
            <img src="portfolio_projects/found/blue_speakers.png" alt="Blue Speakers" style="aspect-ratio: 1500/1001;">
        </div>
        <div class="slide">
            <img src="portfolio_projects/found/logo_test1.png" alt="Found Logo Test" style="aspect-ratio: 1071/1500;">
        </div>
    </main>
    
    <script>
        // Wait for all images to fully download before executing layout math
        window.addEventListener('load', () => {
            const container = document.getElementById('scrollContainer');
            const originalSlides = Array.from(container.children);
            
            // Force explicit pixel widths on every slide to bypass Safari flexbox collapse bugs
            const h = container.clientHeight;
            originalSlides.forEach(slide => {
                const media = slide.querySelector('img, video');
                if (media && media.style.aspectRatio) {
                    const ratioStr = media.style.aspectRatio;
                    const parts = ratioStr.split('/');
                    if (parts.length === 2) {
                        const ratio = parseFloat(parts[0]) / parseFloat(parts[1]);
                        slide.style.width = (h * ratio) + 'px';
                    }
                }
            });

            const cloneMultiplier = 40; 
            const middleSetIndex = 20;

            // Clone sets to create the massive buffer
            for (let i = 0; i < cloneMultiplier; i++) {
                originalSlides.forEach(slide => {
                    container.appendChild(slide.cloneNode(true));
                });
            }

            // Identify the exact DOM element we want to start on
            const targetSlideIndex = middleSetIndex * originalSlides.length;
            const targetSlide = container.children[targetSlideIndex];

            // Perform the jump synchronously BEFORE fading out the loader
            container.style.scrollBehavior = 'auto';
            container.scrollLeft = targetSlide.offsetLeft;
            void container.offsetHeight; // Reflow
            container.style.scrollBehavior = 'smooth';

            // Now that layout is perfect, fade out loader
            const loader = document.querySelector('.loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);

            // Lazy Load Videos for Performance (Staggered to prevent scroll stutter)
            const videoObserver = new IntersectionObserver((entries) => {
                let loadDelay = 0;
                entries.forEach((entry) => {
                    const video = entry.target;
                    if (entry.isIntersecting) {
                        if (!video.querySelector('source')) {
                            setTimeout(() => {
                                const source = document.createElement('source');
                                source.src = video.getAttribute('data-src');
                                source.type = 'video/mp4';
                                video.appendChild(source);
                            }, loadDelay);
                            loadDelay += 150;
                        }
                        video.play().catch(e => console.log('Autoplay prevented:', e));
                    } else {
                        video.pause();
                    }
                });
            }, {
                root: container,
                rootMargin: '4000px 0px'
            });

            container.querySelectorAll('video').forEach(video => {
                videoObserver.observe(video);
            });

            // If videos load metadata later and push the layout, re-anchor (only if the user hasn't touched the scroll yet)
            let hasUserInteracted = false;
            container.addEventListener('wheel', () => hasUserInteracted = true, { once: true });
            container.addEventListener('touchstart', () => hasUserInteracted = true, { once: true });
            container.addEventListener('mousedown', () => hasUserInteracted = true, { once: true });
            
            container.querySelectorAll('video').forEach(v => {
                v.addEventListener('loadedmetadata', () => {
                    if (!hasUserInteracted) {
                        container.style.scrollBehavior = 'auto';
                        container.scrollLeft = targetSlide.offsetLeft;
                        void container.offsetHeight;
                        container.style.scrollBehavior = 'smooth';
                    }
                });
            });

            // Safety-net teleport
            let scrollTimeout;
            container.addEventListener('scroll', () => {
                clearTimeout(scrollTimeout);
                
                scrollTimeout = setTimeout(() => {
                    const currentScroll = container.scrollLeft;
                    
                    // Approximate width is fine for detecting if we hit the boundaries
                    const singleSetWidthApprox = container.scrollWidth / (cloneMultiplier + 1);

                    if (currentScroll < singleSetWidthApprox * 2) {
                        // Always teleport to the exact DOM coordinate
                        container.scrollLeft = targetSlide.offsetLeft;
                        void container.offsetHeight;
                    } 
                    else if (currentScroll > singleSetWidthApprox * (cloneMultiplier - 2)) {
                        container.scrollLeft = targetSlide.offsetLeft;
                        void container.offsetHeight;
                    }
                }, 200);
            });

            // Enable horizontal scrolling with mouse wheel/trackpad
            container.addEventListener('wheel', (evt) => {
                if (evt.deltaY !== 0) {
                    evt.preventDefault();
                    container.scrollLeft += evt.deltaY;
                }
            }, { passive: false });

            // Bracket Scroll Button Logic
            const scrollBtnLeft = document.getElementById('scrollBtnLeft');
            const scrollBtnRight = document.getElementById('scrollBtnRight');
            
            scrollBtnLeft.addEventListener('click', () => {
                const scrollAmount = window.innerWidth * 0.6; 
                container.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
            });

            scrollBtnRight.addEventListener('click', () => {
                const scrollAmount = window.innerWidth * 0.6; 
                container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>

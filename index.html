<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMB Design</title>
    <link rel="icon" type="image/png" href="ampersand.png?v=2">
    <!-- Preload the critical first image so it appears instantly -->
    <link rel="preload" as="image" href="portfolio_projects/rut_holly/wedding_invite.png">
    <link rel="stylesheet" href="style.css?v=10">
</head>
<body>
    <div class="loader"></div>

    <!-- Top Text Container -->
    <div class="top-container">
        <p class="description">
            <strong>Holly Mia Britton</strong> is a British-American artist, designer, and creative director who graduated from Parsons, The New School. Her craft includes commissioned artworks, custom stationery, visual identities, and creative direction for select clients.
        </p>
        <div class="links">
            <a href="mailto:hollybrittondesign@gmail.com" class="hover-link">Email</a>
            <a href="https://www.instagram.com/hollymia" target="_blank" class="hover-link">Instagram</a>
        </div>
    </div>

    <!-- Fixed Dynamic Scroll Buttons -->
    <img src="bracket.png" alt="Scroll Left" class="scroll-bracket left" id="scrollBtnLeft">
    <img src="bracket_right.png" alt="Scroll Right" class="scroll-bracket right" id="scrollBtnRight">

    <!-- Horizontal Scroll Gallery -->
    <main class="horizontal-scroll" id="scrollContainer">
        
        <!-- Rut & Holly -->
        <div class="slide" style="aspect-ratio: 1098/1500;">
            <img src="portfolio_projects/rut_holly/wedding_invite.png" alt="Wedding Invite">
        </div>
        <div class="slide" style="aspect-ratio: 1221/1500;">
            <img src="portfolio_projects/rut_holly/booklets.jpg" loading="lazy" decoding="async" alt="Booklets">
        </div>
        <div class="slide" style="aspect-ratio: 1542/1080;">
            <video loop muted playsinline preload="none" poster="portfolio_projects/rut_holly/booklet_poster.jpg" data-src="portfolio_projects/rut_holly/booklet.mp4">
            </video>
        </div>
        <div class="slide" style="aspect-ratio: 1000/1500;">
            <img src="portfolio_projects/rut_holly/tati.png" loading="lazy" decoding="async" alt="Tati">
        </div>
        <div class="slide" style="aspect-ratio: 2498/2558;">
            <video loop muted playsinline preload="none" poster="portfolio_projects/rut_holly/foldout_poster.jpg" data-src="portfolio_projects/rut_holly/foldout.mp4">
            </video>
        </div>

        <!-- Indie & Harry -->
        <div class="slide" style="aspect-ratio: 1159/1500;">
            <img src="portfolio_projects/indie_harry/invite_final.png" loading="lazy" decoding="async" alt="Invite">
        </div>
        <div class="slide" style="aspect-ratio: 1159/1500;">
            <img src="portfolio_projects/indie_harry/flower.png" loading="lazy" decoding="async" alt="Flower">
        </div>
        <div class="slide" style="aspect-ratio: 1159/1500;">
            <img src="portfolio_projects/indie_harry/map_2.png" loading="lazy" decoding="async" alt="Map 2">
        </div>

        <!-- Found -->
        <div class="slide" style="aspect-ratio: 1500/1001;">
            <img src="portfolio_projects/found/blue_speakers.png" loading="lazy" decoding="async" alt="Blue Speakers">
        </div>
        <div class="slide" style="aspect-ratio: 1071/1500;">
            <img src="portfolio_projects/found/logo_test1.png" loading="lazy" decoding="async" alt="Found Logo Test">
        </div>
    </main>
    
    <script>
        // Run as soon as the DOM is parsed, NOT on window 'load'. Every slide is sized by an
        // explicit CSS aspect-ratio, so the layout math needs no image to have downloaded.
        // Waiting for 'load' meant waiting on ~19MB of artwork before the loader overlay could
        // be dismissed — which on a mobile connection is a blank screen for many seconds.
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('scrollContainer');
            const originalSlides = Array.from(container.children);
            // Declared out here so the scroll teleport and the resize re-anchor below share a
            // single binding. Scoped inside the timeout it was unreachable from those handlers.
            let singleSetWidth = 0;
            // Where we are within set 1, as a 0-1 fraction, recorded while the layout is still
            // valid. On resize scrollLeft is already stale, so it cannot be derived after the
            // fact — it has to be remembered from before. 0 = anchored on the first slide.
            let positionInSet = 0;

            // Failsafe: the loader is a full-screen opaque overlay, so anything that stops the
            // init chain leaves the visitor staring at a blank screen with no way out. Never let
            // it outlive this timeout, whatever else happens.
            const revealLoader = () => {
                const loader = document.querySelector('.loader');
                if (!loader || loader.dataset.dismissed) return;
                loader.dataset.dismissed = '1';
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            };
            setTimeout(revealLoader, 1500);

            // Wait a micro-tick to ensure CSS aspect-ratios have populated offsetWidth
            setTimeout(() => {
                // Calculate exact width of one set directly from the CSS engine's layout
                originalSlides.forEach(slide => {
                    singleSetWidth += slide.offsetWidth;
                });

            const cloneMultiplier = 3; // 1 original + 3 clones = 4 sets total
            const middleSetIndex = 1;

            // Clone sets to create the buffer
            for (let i = 0; i < cloneMultiplier; i++) {
                originalSlides.forEach(slide => {
                    container.appendChild(slide.cloneNode(true));
                });
            }

            // Clones only exist as of this tick, so register every video — originals AND
            // clones — with the observer. Observing an element twice is a no-op, and without
            // this the cloned sets we teleport into would never load and would render blank.
            container.querySelectorAll('video').forEach(video => videoObserver.observe(video));

            // Re-derive the set width from the real layout position of set 1's first slide.
            // Summing offsetWidth accumulates per-slide integer rounding; offsetLeft is the
            // actual anchor the browser will scroll to.
            singleSetWidth = container.children[originalSlides.length].offsetLeft;

            // Force Safari to recalculate the massive new layout boundaries before we attempt to scroll
            void container.scrollWidth;

            // Execute the jump in a short timeout to guarantee the DOM has physically expanded
            setTimeout(() => {
                container.style.scrollBehavior = 'auto';
                container.scrollLeft = singleSetWidth * middleSetIndex;
                
                // Force a micro-scroll to physically flush the Safari paint pipeline before revealing
                setTimeout(() => {
                    container.scrollLeft += 1;
                    container.scrollLeft -= 1;
                    container.style.scrollBehavior = 'smooth';

                    // Now that layout and paint are perfect, fade out loader
                    revealLoader();
            }, 50); // End of micro-scroll timeout
            }, 50); // End of layout expand timeout
            }, 0); // End of initialization timeout

            // Lazy Load Videos for Performance (Staggered to prevent scroll stutter)
            const videoObserver = new IntersectionObserver((entries) => {
                let loadDelay = 0;
                entries.forEach((entry) => {
                    const video = entry.target;
                    if (entry.isIntersecting) {
                        if (!video.querySelector('source')) {
                            setTimeout(() => {
                                const source = document.createElement('source');
                                source.src = video.getAttribute('data-src');
                                source.type = 'video/mp4';
                                video.appendChild(source);
                            }, loadDelay);
                            loadDelay += 150;
                        }
                        video.play().catch(e => console.log('Autoplay prevented:', e));
                    } else {
                        video.pause();
                    }
                });
            }, {
                root: container,
                rootMargin: '0px 200px' // Horizontal scroller: margin must be on the left/right axis
            });

            container.querySelectorAll('video').forEach(video => {
                videoObserver.observe(video);
            });

            // Cleanup: No need for loadedmetadata re-anchoring since we use explicit pixel widths now

            // Safety-net teleport (Debounced to only run after momentum scrolling stops)
            let scrollTimeout;
            container.addEventListener('scroll', () => {
                clearTimeout(scrollTimeout);
                
                scrollTimeout = setTimeout(() => {
                    const currentScroll = container.scrollLeft;
                    
                    // If user scrolls out of the middle set (Set 1)
                    if (currentScroll < singleSetWidth || currentScroll >= singleSetWidth * 2) {
                        // Find their exact visual sub-pixel offset within whatever set they landed in
                        const offsetWithinSet = currentScroll % singleSetWidth;
                        
                        // Teleport them silently back to Set 1 at the exact same visual offset
                        container.style.scrollBehavior = 'auto';
                        container.scrollLeft = singleSetWidth + offsetWithinSet;
                        void container.offsetHeight;
                        container.style.scrollBehavior = 'smooth';
                    }

                    // Record the settled position while this layout is still the live one.
                    if (singleSetWidth) {
                        positionInSet = (container.scrollLeft - singleSetWidth) / singleSetWidth;
                    }
                }, 150);
            });

            // Slide widths are derived from viewport HEIGHT (height: Nvh + aspect-ratio), so any
            // viewport resize rescales the entire horizontal track. Mobile Safari collapsing its
            // address bar moments after load is exactly this: the track shrinks/grows but
            // scrollLeft keeps its old pixel value and you land mid-sequence instead of on the
            // first slide. Re-measure and re-anchor, preserving relative position within the set.
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);

                resizeTimeout = setTimeout(() => {
                    // Re-measure against the NEW layout, then restore the position we recorded
                    // while the old layout was still valid. Deriving it from the current
                    // scrollLeft would just carry the stale offset forward.
                    singleSetWidth = container.children[originalSlides.length].offsetLeft;
                    if (!singleSetWidth) return;

                    container.style.scrollBehavior = 'auto';
                    container.scrollLeft = singleSetWidth + (positionInSet * singleSetWidth);
                    void container.offsetHeight;
                    container.style.scrollBehavior = 'smooth';
                }, 150);
            });

            // Enable horizontal scrolling with mouse wheel/trackpad
            container.addEventListener('wheel', (evt) => {
                if (evt.deltaY !== 0) {
                    evt.preventDefault();
                    container.scrollLeft += evt.deltaY;
                }
            }, { passive: false });

            // Bracket Scroll Button Logic
            const scrollBtnLeft = document.getElementById('scrollBtnLeft');
            const scrollBtnRight = document.getElementById('scrollBtnRight');
            
            scrollBtnLeft.addEventListener('click', () => {
                const scrollAmount = window.innerWidth * 0.6; 
                container.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
            });

            scrollBtnRight.addEventListener('click', () => {
                const scrollAmount = window.innerWidth * 0.6; 
                container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
